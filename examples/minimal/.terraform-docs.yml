formatter: "markdown table"
version: ">= 0.19.0"

header-from: terraform.tf

recursive:
  enabled: false

# Embed the example's own main.tf at the top of the generated section so the README shows exactly
# what the example does, then the usual terraform-docs sections.
content: |-
  ## Example configuration

  ```hcl
  {{ include "main.tf" }}
  ```

  {{ .Requirements }}

  {{ .Providers }}

  {{ .Modules }}

  {{ .Resources }}

  {{ .Inputs }}

  {{ .Outputs }}

output:
  file: README.md
  mode: inject
  template: |-
    <!-- BEGIN_TF_DOCS -->
    {{ .Content }}
    <!-- END_TF_DOCS -->

sort:
  enabled: true
  by: name

settings:
  anchor: true
  color: true
  default: true
  description: true
  escape: true
  hide-empty: false
  html: true
  indent: 2
  lockfile: false
  read-comments: true
  required: true
  sensitive: true
  type: true
